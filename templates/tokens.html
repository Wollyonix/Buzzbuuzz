<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Token Estimator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="p-4">
    <div class="container">
      <h1 class="mb-3">Token Usage</h1>
      <form id="tokensForm" method="post" action="/tokens">
        <div class="mb-3">
          <label for="payload" class="form-label">Paste JSON (messages) or plain lines</label>
          <textarea class="form-control" id="payload" name="payload" rows="10" required>{{ payload|default('') }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Estimate Tokens</button>
      </form>

      {% if results is defined %}
      <hr>
      <h3>Results</h3>
      <div class="mb-3">
        <strong>Total tokens (words):</strong> {{ results.total }}
      </div>
      <div>
        <h5>Details</h5>
        <ul>
          {% for r in results.details %}
            <li>{{ r.label }} — words: {{ r.count }}</li>
          {% endfor %}
        </ul>
      </div>
      {% endif %}
    </div>
  </body>
</html>
